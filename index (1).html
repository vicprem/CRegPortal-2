<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Consultancy Register — AI-Powered Premium Services Client Portal"/>
  <meta name="theme-color" content="#0D1B2A"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #0D1B2A; font-family: Georgia, serif; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,.03); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,.18) !important; }
    select option { background: #1A2E45; color: #fff; }
    button:focus-visible { outline: 2px solid #2D7DD2; outline-offset: 2px; }
  </style>
